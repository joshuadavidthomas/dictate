[sources.cmu-arctic]
url = "http://festvox.org/cmu_arctic/packed/cmu_us_bdl_arctic.tar.bz2"
license = "cmu-arctic/LICENSE"
transcripts = "etc/txt.done.data"
source_format = "16 kHz mono WAV"
fixture_transform = "copied without audio conversion"

[sources.ljspeech]
url = "https://data.keithito.com/data/speech/LJSpeech-1.1.tar.bz2"
mirror_url = "https://huggingface.co/datasets/flexthink/ljspeech"
mirror_revision = "7367bcc33648be329bbef057cc97d0b83cadee11"
license = "ljspeech/LICENSE"
transcripts = "metadata.csv"
transcripts_url = "https://huggingface.co/datasets/flexthink/ljspeech/resolve/7367bcc33648be329bbef057cc97d0b83cadee11/metadata.csv"
source_format = "22.05 kHz mono 16-bit PCM WAV"
fixture_transform = "ffmpeg -y -i <source-wav> -ac 1 -ar 16000 -sample_fmt s16 <fixture-wav>"

[sources.spoken-commands]
generator = "piper-tts"
voice_source_url = "https://huggingface.co/rhasspy/piper-voices"
voices = [
    "en_US-ljspeech-high.onnx (quality: high)",
    "en_US-ljspeech-medium.onnx (quality: medium)",
]
dataset_provenance_url = "https://keithito.com/LJ-Speech-Dataset/"
license = "spoken-commands/LICENSE"
generated_audio_license = "CC0-1.0"
scripts = [
    "clip-a: is this working question mark yes exclamation mark item audio next item comma text period",
    "clip-b: hello comma world period new paragraph thanks period this is a simple test",
    "clip-c: that is a good question. mark will answer. the sentence has a comma in it.",
]
source_format = "Piper-generated WAV converted to 16 kHz mono 16-bit PCM WAV"
fixture_transform = "Piper synthesis is non-deterministic; committed WAVs are canonical. Per-fixture fixture_transform entries record the as-run generation and conversion commands."

